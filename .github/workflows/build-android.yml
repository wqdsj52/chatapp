name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'apps/android/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Gradle and generate wrapper
        working-directory: apps/android
        run: |
          # Remove the corrupted wrapper jar from git
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradle/wrapper/gradle-wrapper.properties
          rm -f gradlew gradlew.bat

          # Download Gradle 8.7 distribution
          curl -fsSL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/

          # Use Gradle to generate wrapper in our project
          /tmp/gradle-8.7/bin/gradle wrapper --gradle-version 8.7

          # Verify the wrapper jar exists and is valid
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: chatapp-android-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error