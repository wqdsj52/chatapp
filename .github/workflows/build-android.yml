name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'apps/android/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Gradle wrapper
        working-directory: apps/android
        run: |
          # Download a known-good gradle-wrapper.jar directly
          GRADLE_VERSION="8.7"
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          
          # Update properties to match
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          chmod +x gradlew
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: chatapp-android-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error