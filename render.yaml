databases:
  - name: chatapp-db
    plan: free
    databaseName: chatapp
    user: chatapp

services:
  - type: web
    name: chatapp-server
    runtime: node
    plan: free
    rootDir: apps/server
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: chatapp-db
          property: connectionString
