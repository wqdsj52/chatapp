version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./apps/server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://chatapp:chatapp123@db:5432/chatapp
      JWT_SECRET: your-secret-key
      PORT: 3001
    depends_on:
      - db

volumes:
  pgdata:
